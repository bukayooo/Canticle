name: Canticle
options:
  bundleIdPrefix: com.canticle
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

configs:
  Debug: debug
  Release: release

targets:
  Canticle:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Canticle
      - path: Canticle.icon
        buildPhase: resources
        type: folder
    resources:
      - path: Canticle/Resources
      - path: "Canticle/Preview Content"
    settings:
      base:
        PRODUCT_NAME: Canticle
        PRODUCT_BUNDLE_IDENTIFIER: com.canticle.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"Canticle/Preview Content\""
        ENABLE_PREVIEWS: true
        SWIFT_EMIT_LOC_STRINGS: true
    info:
      path: Canticle/Info.plist
      properties:
        CFBundleDisplayName: Canticle
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Automatic
        ITSAppUsesNonExemptEncryption: false
schemes:
  Canticle:
    build:
      targets:
        Canticle: all
    run:
      config: Debug
    archive:
      config: Release
